workflowVersion: 1.0.0
speakeasyVersion: latest
sources:
    ClientCasa API:
        inputs:
            # Pulls the live spec from production. The SDK regen workflow
            # fetches this URL on schedule (and on workflow_dispatch) — if the
            # spec has changed, Speakeasy opens a PR with the regenerated SDK.
            - location: https://www.clientcasa.com/api/v1/openapi.json
        output: .speakeasy/out.openapi.yaml
        registry:
            location: registry.speakeasyapi.dev/delmare-digital/clientcasa/client-casa-api
targets:
    client-casa:
        target: typescript
        source: ClientCasa API
        codeSamples:
            registry:
                location: registry.speakeasyapi.dev/delmare-digital/clientcasa/client-casa-api-typescript-code-samples
            labelOverride:
                fixedValue: Typescript (SDK)
            blocking: false
