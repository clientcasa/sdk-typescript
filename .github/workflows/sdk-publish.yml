name: Publish SDK

on:
  push:
    branches:
      - main
    paths:
      - 'RELEASES.md'
      - '.speakeasy/gen.lock'

# `id-token: write` is required for npm Trusted Publishing (OIDC).
# Configured at https://www.npmjs.com/package/@clientcasa/sdk/access — no
# NPM_TOKEN secret is needed once Trusted Publisher is set on the package.
permissions:
  id-token: write
  contents: write

jobs:
  publish:
    name: Publish to npm
    uses: speakeasy-api/sdk-generation-action/.github/workflows/sdk-publish.yaml@v15
    with:
      target: client-casa
    secrets:
      github_access_token: ${{ secrets.GITHUB_TOKEN }}
      speakeasy_api_key: ${{ secrets.SPEAKEASY_API_KEY }}
