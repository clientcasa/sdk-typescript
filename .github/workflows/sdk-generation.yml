name: Generate SDK

on:
  workflow_dispatch: {}
  schedule:
    # Daily at 09:00 UTC. Speakeasy exits cleanly when the spec is unchanged.
    - cron: '0 9 * * *'

permissions:
  id-token: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  generate:
    name: Regenerate from /api/v1/openapi.json
    uses: speakeasy-api/sdk-generation-action/.github/workflows/workflow-executor.yaml@v15
    with:
      target: client-casa
      mode: pr
      speakeasy_version: latest
    secrets:
      github_access_token: ${{ secrets.GITHUB_TOKEN }}
      speakeasy_api_key: ${{ secrets.SPEAKEASY_API_KEY }}
